name: Publish dashboard demo to GitHub Pages

# Publishes web/ to the gh-pages branch; GitHub Pages serves it from there.
# On github.io the dashboard runs in DEMO MODE automatically: sample data,
# order submission disabled, no keys or backend involved.

on:
  push:
    branches: [main]
    paths: ["web/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push web/ to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/site
          cp -r web/. /tmp/site/
          touch /tmp/site/.nojekyll
          cd /tmp/site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish dashboard demo"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
